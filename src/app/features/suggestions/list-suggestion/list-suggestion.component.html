<div class="list-container">
  <div class="list-header">
    <h2>Liste des Suggestions</h2>
    <button class="btn-add" (click)="goToAddForm()">
      ➕ Ajouter une suggestion
    </button>
  </div>

  <div class="card" *ngFor="let s of suggestions" [ngClass]="s.status">
    <div class="card-header">
      <div class="card-title">
        <a [routerLink]="[s.id]">{{ s.title }}</a>
      </div>
      <span class="status-badge {{ s.status }}">{{ s.status }}</span>
    </div>

    <div class="card-meta">
      <span class="category">📁 {{ s.category }}</span>
      <span class="date">📅 {{ s.date | date : "dd MMM yyyy" }}</span>
    </div>

    <div class="card-description">
      {{ s.description }}
    </div>

    <div class="card-actions">
      <button class="btn-details" (click)="goToDetails(s)">🔍 Détails</button>

      <button class="btn-like" (click)="likeSuggestion(s)">
        👍 Like ({{ s.nbLikes }})
      </button>

      <button class="btn-fav" (click)="addToFavorites(s)">♡ Favoris</button>

      <button class="btn-delete" (click)="deleteSuggestion(s.id)">
        🗑️ Supprimer
      </button>
    </div>
  </div>

  <div *ngIf="suggestions.length === 0" class="empty-state">
    <p>Aucune suggestion disponible.</p>
  </div>
</div>
